<div class="text-center py-16 relative">
    <!-- Decorative background circles -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 rounded-full bg-gradient-to-br from-[#FF6B6B]/5 to-[#FFD700]/5 pointer-events-none"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 rounded-full bg-gradient-to-br from-[#FFA07A]/5 to-[#FF6B6B]/5 pointer-events-none -translate-x-[calc(50%+40px)]"></div>

    <div class="relative">
        {% if icon %}
        <div class="text-7xl mb-6 inline-block float-sparkle">{{ icon }}</div>
        {% else %}
        <svg class="w-24 h-24 mx-auto mb-6 text-[#FF6B6B]/30 dark:text-[#FF6B6B]/20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 15.546c-.523 0-1.046.151-1.5.454a2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0A2.701 2.701 0 003 15.546M3 15.546V8.25a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 8.25v7.296M3 15.546l2.61-3.045a.75.75 0 011.2.019l2.173 2.891a.75.75 0 001.022.208l2.653-1.59a.75.75 0 01.915.03l2.912 2.425a.75.75 0 001.077-.038l2.438-2.926a.75.75 0 01.96-.155L21 15.546m-9-3.75h.008v.008H12v-.008z"/>
        </svg>
        {% endif %}
        <h3 class="text-xl font-semibold text-gray-400 dark:text-gray-500 mb-3">{{ message }}</h3>
        {% if description %}
        <p class="text-gray-400/70 dark:text-gray-500/70 mb-8 max-w-md mx-auto text-sm leading-relaxed">
            {{ description }}
        </p>
        {% endif %}
        {% if action_url and action_text %}
        <a href="{{ action_url }}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-[#FF6B6B] to-[#FFA07A] hover:shadow-lg hover:shadow-[#FF6B6B]/30 hover:-translate-y-0.5 transition-all btn-ripple">
            {% if action_icon %}<span>{{ action_icon }}</span>{% endif %}
            <span>{{ action_text }}</span>
        </a>
        {% endif %}
    </div>
</div>
