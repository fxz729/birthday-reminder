<div id="confirm-modal" class="fixed inset-0 z-[100] hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop fixed inset-0 bg-black/40 transition-opacity"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#2D2D3F] rounded-2xl shadow-2xl max-w-md w-full p-6 relative overflow-hidden" style="max-width: 420px;">
            <!-- Decorative corner -->
            <div class="absolute -top-10 -right-10 w-24 h-24 rounded-full bg-gradient-to-br from-[#FF6B6B]/10 to-[#FFD700]/10 pointer-events-none"></div>
            <div class="flex items-center gap-3 mb-4">
                <span class="text-2xl" id="confirm-modal-icon">⚠️</span>
                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100" id="confirm-modal-title">确认</h3>
            </div>
            <p class="text-gray-600 dark:text-gray-300 text-sm leading-relaxed mb-6" id="confirm-modal-message">确定要执行此操作吗？</p>
            <div class="flex justify-end gap-3">
                <button id="confirm-modal-cancel" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all hover:-translate-y-0.5">取消</button>
                <button id="confirm-modal-confirm" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-[#FF6B6B] to-[#FFA07A] hover:shadow-lg hover:shadow-[#FF6B6B]/30 hover:-translate-y-0.5 transition-all">确认</button>
            </div>
        </div>
    </div>
</div>
