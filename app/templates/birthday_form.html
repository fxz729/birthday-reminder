{% extends "base.html" %}

{% block title %}{% if birthday %}编辑{% else %}添加{% endif %}生日{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto fade-in-up">
    <div class="bg-white dark:bg-[#2D2D3F] rounded-2xl shadow-xl shadow-[#FF6B6B]/10 dark:shadow-black/30 overflow-hidden relative">
        <!-- Gradient accent bar -->
        <div class="h-1.5 bg-gradient-to-r from-[#FF6B6B] via-[#FFA07A] to-[#FFD700]"></div>

        <!-- Decorative emojis -->
        <span class="absolute top-12 right-8 text-5xl opacity-5 dark:opacity-10 pointer-events-none">🎂</span>
        <span class="absolute bottom-12 left-8 text-5xl opacity-5 dark:opacity-10 pointer-events-none">🎁</span>

        <div class="p-6 sm:p-8 lg:p-10">
            <!-- Title -->
            <h2 class="font-['Cormorant_Garamond',serif] text-2xl font-semibold text-[#8B4557] dark:text-gray-100 mb-6 flex items-center gap-3">
                {% if birthday %}
                ✏️ 编辑生日信息
                {% else %}
                🎂 添加新生日
                {% endif %}
            </h2>

            <!-- Error Banner -->
            {% if errors %}
            <div class="flex items-center gap-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-4 py-3 rounded-xl mb-6 text-sm shake">
                <span>❌</span>
                <span>{{ errors }}</span>
            </div>
            {% endif %}

            <!-- Form -->
            <form method="POST" action="">
                <!-- Two-column grid: Name + Date -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5 mb-4">
                    <div>
                        <label for="name" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">姓名 *</label>
                        <input type="text" id="name" name="name" required placeholder="输入姓名"
                               value="{{ birthday.name if birthday else '' }}"
                               class="w-full px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all">
                    </div>
                    <div>
                        <label for="birth_date" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">生日日期 *</label>
                        <input type="date" id="birth_date" name="birth_date" required
                               value="{{ birthday.birth_date if birthday else '' }}"
                               class="w-full px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all">
                    </div>
                </div>

                <!-- Type Toggle -->
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">生日类型 *</label>
                    <div class="flex gap-3" x-data="{ isLunar: {{ 'true' if birthday and birthday.is_lunar else 'false' }} }">
                        <label class="flex-1 flex flex-col items-center gap-1 px-4 py-3 rounded-xl border-2 cursor-pointer transition-all text-center"
                               :class="isLunar ? 'border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E]' : 'border-[#FF6B6B] bg-[#FFE8E8] dark:bg-[#FF6B6B]/10'">
                            <input type="radio" name="is_lunar" value="false"
                                   class="hidden"
                                   @click="isLunar = false"
                                   {% if not birthday or not birthday.is_lunar %}checked{% endif %}>
                            <span class="text-xl">☀️</span>
                            <span class="text-xs font-semibold" :class="isLunar ? 'text-gray-400' : 'text-[#FF6B6B]'">公历生日</span>
                        </label>
                        <label class="flex-1 flex flex-col items-center gap-1 px-4 py-3 rounded-xl border-2 cursor-pointer transition-all text-center"
                               :class="isLunar ? 'border-[#FF6B6B] bg-[#FFE8E8] dark:bg-[#FF6B6B]/10' : 'border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E]'">
                            <input type="radio" name="is_lunar" value="true"
                                   class="hidden"
                                   @click="isLunar = true"
                                   {% if birthday and birthday.is_lunar %}checked{% endif %}>
                            <span class="text-xl">🌙</span>
                            <span class="text-xs font-semibold" :class="isLunar ? 'text-[#FF6B6B]' : 'text-gray-400'">农历生日</span>
                        </label>
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-4">
                    <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">提醒邮箱 *</label>
                    <input type="email" id="email" name="email" required placeholder="接收生日提醒的邮箱地址"
                           value="{{ birthday.email if birthday else '' }}"
                           class="w-full px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all">
                </div>

                <!-- Gift Idea -->
                <div class="mb-4">
                    <label for="gift_idea" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">🎁 礼物想法</label>
                    <textarea id="gift_idea" name="gift_idea" rows="3"
                              placeholder="记录一些礼物想法，以后参考"
                              class="w-full px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all resize-y min-h-[80px]">{{ birthday.gift_idea if birthday and birthday.gift_idea else '' }}</textarea>
                </div>

                <!-- Notes -->
                <div class="mb-6">
                    <label for="notes" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">📝 备注</label>
                    <textarea id="notes" name="notes" rows="3"
                              placeholder="其他备注信息"
                              class="w-full px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all resize-y min-h-[80px]">{{ birthday.notes if birthday and birthday.notes else '' }}</textarea>
                </div>

                <!-- Buttons -->
                <div class="flex flex-col sm:flex-row gap-3 justify-center">
                    <a href="/birthdays" class="flex-1 text-center px-6 py-3 rounded-xl text-sm font-semibold text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">
                        取消
                    </a>
                    <button type="submit" class="flex-1 px-6 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-[#FF6B6B] to-[#FFA07A] hover:shadow-lg hover:shadow-[#FF6B6B]/30 hover:-translate-y-0.5 transition-all btn-ripple">
                        {% if birthday %}保存修改{% else %}添加生日{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
