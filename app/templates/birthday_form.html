{% extends "base.html" %}
{% block title %}{% if birthday %}编辑{% else %}添加{% endif %}生日{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto fade-in-up">
    <div class="bg-white dark:bg-[#2D2D3F] rounded-2xl shadow-xl shadow-[#FF6B6B]/10 dark:shadow-black/30 overflow-hidden relative">
        <div class="h-1.5 bg-gradient-to-r from-[#FF6B6B] via-[#FFA07A] to-[#FFD700] gradient-border-anim"></div>

        <!-- Decorative elements -->
        <svg class="absolute top-12 right-8 w-24 h-24 text-[#FF6B6B]/5 dark:text-[#FF6B6B]/10 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 15.546c-.523 0-1.046.151-1.5.454a2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0A2.701 2.701 0 003 15.546M3 15.546V8.25a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 8.25v7.296"/>
        </svg>
        <svg class="absolute bottom-12 left-8 w-24 h-24 text-[#FFA07A]/5 dark:text-[#FFA07A]/10 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/>
        </svg>

        <div class="p-6 sm:p-8 lg:p-10 relative z-10">
            <!-- Title -->
            <h2 class="font-['Cormorant_Garamond',serif] text-2xl font-semibold text-[#8B4557] dark:text-gray-100 mb-6 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#FF6B6B]/20 to-[#FFA07A]/20 flex items-center justify-center">
                    {% if birthday %}
                    <svg class="w-5 h-5 text-[#FF6B6B]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    {% else %}
                    <svg class="w-5 h-5 text-[#FF6B6B]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    {% endif %}
                </div>
                {% if birthday %}编辑生日信息{% else %}添加新生日{% endif %}
            </h2>

            {% if errors %}
            <div class="flex items-center gap-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-4 py-3 rounded-xl mb-6 text-sm shake">
                <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span>{{ errors }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/birthdays/">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5 mb-4">
                    <div>
                        <label for="name" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">
                            <svg class="w-4 h-4 inline mr-1 -mt-0.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            姓名 *
                        </label>
                        <input type="text" id="name" name="name" required placeholder="输入姓名"
                               value="{{ birthday.name if birthday else '' }}"
                               class="w-full px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">
                            <svg class="w-4 h-4 inline mr-1 -mt-0.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            生日日期 *
                        </label>
                        <div class="flex gap-2">
                            <select id="birth_month" name="birth_month" required
                                    class="flex-1 px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all">
                                <option value="">月份</option>
                                {% for m in range(1, 13) %}
                                <option value="{{ '%02d'|format(m) }}" {% if birthday and birthday.birth_date[5:7] == '%02d'|format(m) %}selected{% endif %}>{{ m }}月</option>
                                {% endfor %}
                            </select>
                            <select id="birth_day" name="birth_day" required
                                    class="flex-1 px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all">
                                <option value="">日期</option>
                                {% for d in range(1, 32) %}
                                <option value="{{ '%02d'|format(d) }}" {% if birthday and birthday.birth_date[8:10] == '%02d'|format(d) %}selected{% endif %}>{{ d }}日</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Type Toggle -->
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">生日类型 *</label>
                    <div class="flex gap-3" x-data="{ isLunar: {{ 'true' if birthday and birthday.is_lunar else 'false' }} }">
                        <label class="flex-1 flex flex-col items-center gap-1.5 px-4 py-3.5 rounded-xl border-2 cursor-pointer transition-all text-center"
                               :class="isLunar ? 'border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E]' : 'border-[#FF6B6B] bg-[#FFE8E8] dark:bg-[#FF6B6B]/10'">
                            <input type="radio" name="is_lunar" value="false" class="hidden" @click="isLunar = false" {% if not birthday or not birthday.is_lunar %}checked{% endif %}>
                            <svg class="w-6 h-6" :class="isLunar ? 'text-gray-400' : 'text-[#FF6B6B]'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                            <span class="text-xs font-semibold" :class="isLunar ? 'text-gray-400' : 'text-[#FF6B6B]'">公历生日</span>
                        </label>
                        <label class="flex-1 flex flex-col items-center gap-1.5 px-4 py-3.5 rounded-xl border-2 cursor-pointer transition-all text-center"
                               :class="isLunar ? 'border-[#FF6B6B] bg-[#FFE8E8] dark:bg-[#FF6B6B]/10' : 'border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E]'">
                            <input type="radio" name="is_lunar" value="true" class="hidden" @click="isLunar = true" {% if birthday and birthday.is_lunar %}checked{% endif %}>
                            <svg class="w-6 h-6" :class="isLunar ? 'text-[#FF6B6B]' : 'text-gray-400'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                            <span class="text-xs font-semibold" :class="isLunar ? 'text-[#FF6B6B]' : 'text-gray-400'">农历生日</span>
                        </label>
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-4">
                    <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">
                        <svg class="w-4 h-4 inline mr-1 -mt-0.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8.688c0-.746.497-1.403 1.185-1.638l7.47-2.556a1.724 1.724 0 011.39 0l7.77 2.556A1.724 1.724 0 0122 8.688v1.035a.75.75 0 01-.75.75H3.75a.75.75 0 01-.75-.75V8.688zM3 12.75v3.563c0 .746.497 1.403 1.185 1.638l7.47 2.556a1.724 1.724 0 001.39 0l7.77-2.556A1.724 1.724 0 0022 16.313V12.75"/></svg>
                        提醒邮箱 *
                    </label>
                    <input type="email" id="email" name="email" required placeholder="接收生日提醒的邮箱地址"
                           value="{{ birthday.email if birthday else '' }}"
                           class="w-full px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all">
                </div>

                <!-- Gift Idea -->
                <div class="mb-4">
                    <label for="gift_idea" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">
                        <svg class="w-4 h-4 inline mr-1 -mt-0.5 text-[#FF6B6B]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg>
                        礼物想法
                    </label>
                    <textarea id="gift_idea" name="gift_idea" rows="3" placeholder="记录一些礼物想法，以后参考"
                              class="w-full px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all resize-y min-h-[80px]">{{ birthday.gift_idea if birthday and birthday.gift_idea else '' }}</textarea>
                </div>

                <!-- Notes -->
                <div class="mb-6">
                    <label for="notes" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">
                        <svg class="w-4 h-4 inline mr-1 -mt-0.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        备注
                    </label>
                    <textarea id="notes" name="notes" rows="3" placeholder="其他备注信息"
                              class="w-full px-4 py-3 rounded-xl border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all resize-y min-h-[80px]">{{ birthday.notes if birthday and birthday.notes else '' }}</textarea>
                </div>

                <!-- Buttons -->
                <div class="flex flex-col sm:flex-row gap-3 justify-center">
                    <a href="/birthdays" class="flex-1 text-center px-6 py-3 rounded-xl text-sm font-semibold text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 hover:-translate-y-0.5 transition-all">
                        <svg class="w-4 h-4 inline mr-1 -mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                        取消
                    </a>
                    <button type="submit" class="flex-1 px-6 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-[#FF6B6B] to-[#FFA07A] hover:shadow-lg hover:shadow-[#FF6B6B]/30 hover:-translate-y-0.5 transition-all btn-ripple">
                        {% if birthday %}
                        <svg class="w-4 h-4 inline mr-1 -mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                        保存修改
                        {% else %}
                        <svg class="w-4 h-4 inline mr-1 -mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                        添加生日
                        {% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
