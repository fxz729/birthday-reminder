{% extends "base.html" %}

{% block title %}注册{% endblock %}

{% block extra_head %}
<style>
    .deco-float {
        animation: decoDrift 6s ease-in-out infinite;
    }
    @keyframes decoDrift {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        33% { transform: translateY(-10px) rotate(5deg); }
        66% { transform: translateY(5px) rotate(-3deg); }
    }
    .deco-float:nth-child(2) { animation-delay: 1s; }
    .deco-float:nth-child(3) { animation-delay: 2s; }
</style>
{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-8rem)] flex items-center justify-center py-8">
    <div class="w-full max-w-md relative">

        <!-- Floating decorative emojis -->
        <span class="deco-float absolute -top-8 -left-8 text-4xl opacity-20 dark:opacity-10 pointer-events-none">🎁</span>
        <span class="deco-float absolute -bottom-6 -right-6 text-3xl opacity-20 dark:opacity-10 pointer-events-none">🎉</span>
        <span class="deco-float absolute top-1/3 -right-10 text-2xl opacity-15 dark:opacity-10 pointer-events-none">🌟</span>

        <!-- Auth Card -->
        <div class="bg-white dark:bg-[#2D2D3F] rounded-2xl shadow-xl shadow-[#FF6B6B]/10 dark:shadow-black/30 overflow-hidden fade-in-up relative">
            <!-- Gradient accent bar -->
            <div class="h-1.5 bg-gradient-to-r from-[#FFD700] via-[#FFA07A] to-[#FF6B6B]"></div>

            <div class="p-8 sm:p-10">
                <!-- App Icon -->
                <div class="text-center mb-6">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-[#FFD700] to-[#FFA07A] text-3xl shadow-lg shadow-[#FFD700]/30 animate-bounce">
                        🎁
                    </div>
                </div>

                <!-- Title -->
                <h1 class="text-center font-['Cormorant_Garamond',serif] text-3xl font-semibold text-gray-800 dark:text-gray-100 mb-1">
                    加入我们
                </h1>
                <p class="text-center text-gray-400 dark:text-gray-500 text-sm mb-8 font-['Quicksand']">
                    创建你的生日提醒账号
                </p>

                <!-- Error Banner -->
                {% if error %}
                <div class="flex items-center gap-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-4 py-3 rounded-xl mb-6 text-sm shake">
                    <span>❌</span>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <!-- Register Form -->
                <form method="POST" action="/auth/register" x-data="registerForm()" @submit.prevent="handleSubmit">
                    <!-- Username -->
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">用户名</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">👤</span>
                            <input type="text" id="username" name="username" x-model="form.username" required
                                   placeholder="选择一个用户名" minlength="3" maxlength="20" autocomplete="username"
                                   class="w-full pl-10 pr-4 py-3 rounded-full border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all"
                                   :class="{ 'border-red-400': errors.username }">
                        </div>
                        <p x-show="errors.username" x-text="errors.username" class="text-red-500 text-xs mt-1 ml-2" style="display:none"></p>
                    </div>

                    <!-- Email -->
                    <div class="mb-4">
                        <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">邮箱</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">📧</span>
                            <input type="email" id="email" name="email" x-model="form.email" required
                                   placeholder="your@email.com" autocomplete="email"
                                   class="w-full pl-10 pr-4 py-3 rounded-full border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all"
                                   :class="{ 'border-red-400': errors.email }">
                        </div>
                        <p x-show="errors.email" x-text="errors.email" class="text-red-500 text-xs mt-1 ml-2" style="display:none"></p>
                    </div>

                    <!-- Password with Strength Bar -->
                    <div class="mb-4">
                        <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">密码</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">🔒</span>
                            <input type="password" id="password" name="password" x-model="form.password" required
                                   placeholder="至少6位密码" minlength="6" autocomplete="new-password"
                                   class="w-full pl-10 pr-4 py-3 rounded-full border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all"
                                   :class="{ 'border-red-400': errors.password }">
                        </div>
                        <!-- Strength Bar -->
                        <div x-show="form.password.length > 0" class="mt-2" style="display:none">
                            <div class="h-1.5 rounded-full bg-gray-200 dark:bg-gray-700 overflow-hidden">
                                <div class="h-full rounded-full transition-all duration-300"
                                     :class="strengthBarClass"
                                     :style="'width: ' + strength.score + '%'"></div>
                            </div>
                            <p class="text-xs mt-1 ml-1" :class="strengthTextClass" x-text="'密码强度: ' + strength.label"></p>
                        </div>
                        <p x-show="errors.password" x-text="errors.password" class="text-red-500 text-xs mt-1 ml-2" style="display:none"></p>
                    </div>

                    <!-- Confirm Password with Match Indicator -->
                    <div class="mb-6">
                        <label for="confirm_password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">确认密码</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">🔒</span>
                            <input type="password" id="confirm_password" name="confirm_password" x-model="form.confirmPassword" required
                                   placeholder="再次输入密码" autocomplete="new-password"
                                   class="w-full pl-10 pr-4 py-3 rounded-full border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all"
                                   :class="{ 'border-green-400': form.confirmPassword && form.password === form.confirmPassword, 'border-red-400': form.confirmPassword && form.password !== form.confirmPassword }">
                        </div>
                        <!-- Match indicator -->
                        <p x-show="form.confirmPassword && form.password === form.confirmPassword" class="text-green-500 text-xs mt-1 ml-2">
                            ✅ 密码匹配
                        </p>
                        <p x-show="form.confirmPassword && form.password !== form.confirmPassword" class="text-red-500 text-xs mt-1 ml-2">
                            ❌ 密码不匹配
                        </p>
                    </div>

                    <!-- Terms Checkbox -->
                    <div class="flex items-start gap-2 mb-6">
                        <input type="checkbox" id="terms" name="terms" x-model="form.terms"
                               class="w-4 h-4 mt-0.5 rounded border-gray-300 text-[#FF6B6B] focus:ring-[#FF6B6B]">
                        <label for="terms" class="text-xs text-gray-500 dark:text-gray-400 leading-relaxed">
                            我已阅读并同意 <a href="#" class="text-[#FF6B6B] hover:underline">服务条款</a> 和 <a href="#" class="text-[#FF6B6B] hover:underline">隐私政策</a>
                        </label>
                    </div>

                    <!-- Submit -->
                    <button type="submit"
                            class="w-full py-3 rounded-full text-sm font-semibold text-white bg-gradient-to-r from-[#FF6B6B] to-[#FFA07A] hover:shadow-lg hover:shadow-[#FF6B6B]/30 hover:-translate-y-0.5 transition-all btn-ripple disabled:opacity-50 disabled:cursor-not-allowed"
                            :disabled="!isValid">
                        注 册
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-3 my-6">
                    <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
                    <span class="text-xs text-gray-400 dark:text-gray-500">或</span>
                    <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
                </div>

                <!-- Login Link -->
                <p class="text-center text-sm text-gray-400 dark:text-gray-500">
                    已有账号？
                    <a href="/auth/login" class="text-[#FF6B6B] hover:text-[#FFA07A] font-semibold transition-colors">立即登录</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function registerForm() {
        return {
            form: {
                username: '',
                email: '',
                password: '',
                confirmPassword: '',
                terms: false,
            },
            errors: {},
            strength: { level: 'none', score: 0, label: '无' },
            get isValid() {
                return this.form.username.length >= 3
                    && this.form.email.includes('@')
                    && this.form.password.length >= 6
                    && this.form.password === this.form.confirmPassword
                    && this.form.terms;
            },
            get strengthBarClass() {
                const map = {
                    weak: 'bg-[#FF4757]',
                    fair: 'bg-[#FFA502]',
                    good: 'bg-[#7EBF8E]',
                    strong: 'bg-[#2ED573]',
                };
                return map[this.strength.level] || 'bg-gray-200';
            },
            get strengthTextClass() {
                const map = {
                    weak: 'text-[#FF4757]',
                    fair: 'text-[#FFA502]',
                    good: 'text-[#7EBF8E]',
                    strong: 'text-[#2ED573]',
                };
                return map[this.strength.level] || 'text-gray-400';
            },
            init() {
                this.$watch('form.password', val => {
                    if (window.estimatePasswordStrength) {
                        this.strength = window.estimatePasswordStrength(val);
                    }
                });
            },
            handleSubmit() {
                // Client-side validation
                this.errors = {};
                if (this.form.username.length < 3) {
                    this.errors.username = '用户名至少3个字符';
                }
                if (!this.form.email.includes('@')) {
                    this.errors.email = '请输入有效的邮箱地址';
                }
                if (this.form.password.length < 6) {
                    this.errors.password = '密码长度至少6位';
                }
                if (this.form.password !== this.form.confirmPassword) {
                    this.errors.confirmPassword = '密码不匹配';
                }
                if (!this.form.terms) {
                    return;
                }
                if (Object.keys(this.errors).length === 0) {
                    this.$el.submit();
                }
            },
        };
    }
</script>
{% endblock %}
