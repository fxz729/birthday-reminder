{% extends "base.html" %}
{% block title %}个人设置{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="max-w-lg w-full fade-in-up">
        <div class="bg-white dark:bg-[#2D2D3F] rounded-2xl shadow-lg shadow-[#FF6B6B]/10 overflow-hidden relative">
            <div class="absolute -top-12 -right-12 w-32 h-32 rounded-full bg-gradient-to-br from-[#FF6B6B]/10 to-[#FFD700]/10 pointer-events-none"></div>
            <div class="h-1.5 bg-gradient-to-r from-[#FF6B6B] via-[#FFA07A] to-[#FFD700]"></div>
            <div class="p-8 relative z-10">
                <!-- Avatar -->
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-[#FF6B6B] to-[#FFA07A] text-3xl shadow-lg shadow-[#FF6B6B]/30 mb-3">
                        <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </div>
                    <h1 class="text-2xl font-['Cormorant_Garamond',serif] font-semibold text-gray-800 dark:text-gray-100">个人设置</h1>
                    <p class="text-sm text-gray-400 dark:text-gray-500 mt-1">管理你的账户信息</p>
                </div>

                {% if error %}
                <div class="mb-6 p-4 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-700 rounded-xl text-red-600 dark:text-red-400 text-sm shake flex items-center gap-2">
                    <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                {% if success %}
                <div class="mb-6 p-4 bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-700 rounded-xl text-green-600 dark:text-green-400 text-sm flex items-center gap-2">
                    <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span>{{ success }}</span>
                </div>
                {% endif %}

                <form method="POST" class="space-y-5">
                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">
                            <svg class="w-4 h-4 inline mr-1 -mt-0.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8.688c0-.746.497-1.403 1.185-1.638l7.47-2.556a1.724 1.724 0 011.39 0l7.77 2.556A1.724 1.724 0 0122 8.688v1.035a.75.75 0 01-.75.75H3.75a.75.75 0 01-.75-.75V8.688zM3 12.75v3.563c0 .746.497 1.403 1.185 1.638l7.47 2.556a1.724 1.724 0 001.39 0l7.77-2.556A1.724 1.724 0 0022 16.313V12.75"/></svg>
                            邮箱
                        </label>
                        <input type="email" name="email" value="{{ user.email }}" required
                               class="w-full px-4 py-3 rounded-full border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-200 focus:border-[#FF6B6B] focus:ring-4 focus:ring-[#FF6B6B]/10 outline-none transition-all input-glow">
                    </div>

                    <hr class="border-gray-100 dark:border-gray-700">

                    <!-- Current Password -->
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">
                            <svg class="w-4 h-4 inline mr-1 -mt-0.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/></svg>
                            当前密码
                        </label>
                        <input type="password" name="current_password" placeholder="输入当前密码以修改"
                               class="w-full px-4 py-3 rounded-full border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-200 focus:border-[#FF6B6B] focus:ring-4 focus:ring-[#FF6B6B]/10 outline-none transition-all input-glow">
                    </div>

                    <!-- New Password -->
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">
                            <svg class="w-4 h-4 inline mr-1 -mt-0.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
                            新密码
                        </label>
                        <input type="password" name="new_password" placeholder="留空则不修改"
                               class="w-full px-4 py-3 rounded-full border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-200 focus:border-[#FF6B6B] focus:ring-4 focus:ring-[#FF6B6B]/10 outline-none transition-all input-glow">
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">
                            <svg class="w-4 h-4 inline mr-1 -mt-0.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
                            确认新密码
                        </label>
                        <input type="password" name="confirm_password" placeholder="再次输入新密码"
                               class="w-full px-4 py-3 rounded-full border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-200 focus:border-[#FF6B6B] focus:ring-4 focus:ring-[#FF6B6B]/10 outline-none transition-all input-glow">
                    </div>

                    <button type="submit"
                            class="w-full py-3 rounded-full bg-gradient-to-r from-[#FF6B6B] to-[#FFA07A] text-white font-medium shadow-lg shadow-[#FF6B6B]/30 hover:shadow-xl hover:shadow-[#FF6B6B]/40 hover:-translate-y-0.5 active:scale-[0.98] transition-all duration-200 btn-ripple">
                        <svg class="w-4 h-4 inline mr-1 -mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                        保存设置
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <a href="/auth/dashboard" class="text-sm text-gray-400 dark:text-gray-500 hover:text-[#FF6B6B] dark:hover:text-[#FF6B6B] transition-colors inline-flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                        返回控制台
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
