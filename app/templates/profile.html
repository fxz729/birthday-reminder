{% extends "base.html" %}
{% block title %}个人设置{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="max-w-lg w-full bg-white dark:bg-[#2D2D3F] rounded-2xl shadow-lg shadow-[#FF6B6B]/10 overflow-hidden">
    <div class="h-1.5 bg-gradient-to-r from-[#FF6B6B] via-[#FFA07A] to-[#FFD700]"></div>
    <div class="p-8">
      <div class="text-center mb-8">
        <div class="text-4xl mb-3 animate-bounce">👤</div>
        <h1 class="text-2xl font-serif text-gray-800 dark:text-gray-100">个人设置</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">管理你的账户信息</p>
      </div>

      {% if error %}
      <div class="mb-6 p-4 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-700 rounded-xl text-red-600 dark:text-red-400 text-sm animate-[shake_0.5s]">
        <span class="mr-2">⚠️</span>{{ error }}
      </div>
      {% endif %}

      {% if success %}
      <div class="mb-6 p-4 bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-700 rounded-xl text-green-600 dark:text-green-400 text-sm">
        <span class="mr-2">✅</span>{{ success }}
      </div>
      {% endif %}

      <form method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">📧 邮箱</label>
          <input type="email" name="email" value="{{ user.email }}" required
                 class="w-full px-4 py-3 rounded-full border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-200 focus:border-[#FF6B6B] focus:ring-4 focus:ring-[#FF6B6B]/10 outline-none transition-all">
        </div>

        <hr class="border-gray-100 dark:border-gray-700">

        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">🔑 当前密码</label>
          <input type="password" name="current_password" placeholder="输入当前密码以修改"
                 class="w-full px-4 py-3 rounded-full border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-200 focus:border-[#FF6B6B] focus:ring-4 focus:ring-[#FF6B6B]/10 outline-none transition-all">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">🔒 新密码</label>
          <input type="password" name="new_password" placeholder="留空则不修改"
                 class="w-full px-4 py-3 rounded-full border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-200 focus:border-[#FF6B6B] focus:ring-4 focus:ring-[#FF6B6B]/10 outline-none transition-all">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1.5">🔒 确认新密码</label>
          <input type="password" name="confirm_password" placeholder="再次输入新密码"
                 class="w-full px-4 py-3 rounded-full border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-200 focus:border-[#FF6B6B] focus:ring-4 focus:ring-[#FF6B6B]/10 outline-none transition-all">
        </div>

        <button type="submit"
                class="w-full py-3 rounded-full bg-gradient-to-r from-[#FF6B6B] to-[#FFA07A] text-white font-medium shadow-lg shadow-[#FF6B6B]/30 hover:shadow-xl hover:shadow-[#FF6B6B]/40 hover:-translate-y-0.5 active:scale-[0.98] transition-all duration-200">
          保存设置
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="/auth/dashboard" class="text-sm text-gray-400 dark:text-gray-500 hover:text-[#FF6B6B] dark:hover:text-[#FF6B6B] transition-colors">
          ← 返回控制台
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
