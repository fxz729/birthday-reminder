{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block extra_head %}
<style>
    .deco-float {
        animation: decoDrift 6s ease-in-out infinite;
    }
    @keyframes decoDrift {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        33% { transform: translateY(-10px) rotate(5deg); }
        66% { transform: translateY(5px) rotate(-3deg); }
    }
    .deco-float:nth-child(2) { animation-delay: 1s; }
    .deco-float:nth-child(3) { animation-delay: 2s; }
</style>
{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-8rem)] flex items-center justify-center py-8">
    <div class="w-full max-w-md relative">

        <!-- Floating decorative emojis -->
        <span class="deco-float absolute -top-8 -left-8 text-4xl opacity-20 dark:opacity-10 pointer-events-none">🎂</span>
        <span class="deco-float absolute -bottom-6 -right-6 text-3xl opacity-20 dark:opacity-10 pointer-events-none">✨</span>
        <span class="deco-float absolute top-1/2 -right-10 text-2xl opacity-15 dark:opacity-10 pointer-events-none">🎈</span>

        <!-- Auth Card -->
        <div class="bg-white dark:bg-[#2D2D3F] rounded-2xl shadow-xl shadow-[#FF6B6B]/10 dark:shadow-black/30 overflow-hidden fade-in-up relative">
            <!-- Gradient accent bar -->
            <div class="h-1.5 bg-gradient-to-r from-[#FF6B6B] via-[#FFA07A] to-[#FFD700]"></div>

            <div class="p-8 sm:p-10">
                <!-- App Icon -->
                <div class="text-center mb-6">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-[#FF6B6B] to-[#FFA07A] text-3xl shadow-lg shadow-[#FF6B6B]/30 animate-bounce">
                        🎂
                    </div>
                </div>

                <!-- Title -->
                <h1 class="text-center font-['Cormorant_Garamond',serif] text-3xl font-semibold text-gray-800 dark:text-gray-100 mb-1">
                    欢迎回来
                </h1>
                <p class="text-center text-gray-400 dark:text-gray-500 text-sm mb-8 font-['Quicksand']">
                    Birthday Wishes
                </p>

                <!-- Error Banner -->
                {% if error %}
                <div class="flex items-center gap-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-4 py-3 rounded-xl mb-6 text-sm shake">
                    <span>❌</span>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <!-- Login Form -->
                <form method="POST" action="/auth/login">
                    <!-- Username -->
                    <div class="mb-4">
                        <label for="username" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">用户名</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">👤</span>
                            <input type="text" id="username" name="username" required placeholder="请输入用户名" autocomplete="username"
                                   class="w-full pl-10 pr-4 py-3 rounded-full border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-6">
                        <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">密码</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">🔒</span>
                            <input type="password" id="password" name="password" required placeholder="请输入密码" autocomplete="current-password"
                                   class="w-full pl-10 pr-4 py-3 rounded-full border border-[#FF6B6B]/20 dark:border-gray-600 bg-white dark:bg-[#1E1E2E] text-gray-800 dark:text-gray-100 placeholder-gray-400 text-sm focus:outline-none focus:border-[#FF6B6B] input-glow transition-all">
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="flex items-center gap-2 mb-6">
                        <input type="checkbox" id="remember" name="remember" class="w-4 h-4 rounded border-gray-300 text-[#FF6B6B] focus:ring-[#FF6B6B]">
                        <label for="remember" class="text-sm text-gray-500 dark:text-gray-400">记住我</label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="w-full py-3 rounded-full text-sm font-semibold text-white bg-gradient-to-r from-[#FF6B6B] to-[#FFA07A] hover:shadow-lg hover:shadow-[#FF6B6B]/30 hover:-translate-y-0.5 transition-all btn-ripple">
                        登 录
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-3 my-6">
                    <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
                    <span class="text-xs text-gray-400 dark:text-gray-500">或</span>
                    <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
                </div>

                <!-- Register Link -->
                <p class="text-center text-sm text-gray-400 dark:text-gray-500">
                    还没有账号？
                    <a href="/auth/register" class="text-[#FF6B6B] hover:text-[#FFA07A] font-semibold transition-colors">立即注册</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
